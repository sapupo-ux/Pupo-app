<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Conteúdo">
<meta name="theme-color" content="#2D5247">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Gestão de Conteúdo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAFAF8;--white:#FFFFFF;--verde:#3C5A44;--verde-d:#243B31;
  --rosa:#D88D70;--cinza:#9A9A96;--cinza-l:#ECEAE5;--texto:#1C1C1A;
  --raio:16px;--raio-sm:10px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--texto);-webkit-font-smoothing:antialiased}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:84px}

/* HEADER */
.hdr{background:var(--verde-d);padding:env(safe-area-inset-top,18px) 18px 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
.hdr-left h1{font-size:10.5px;color:var(--rosa);letter-spacing:1.8px;text-transform:uppercase;font-weight:600;margin-bottom:3px}
.hdr-left h2{font-size:21px;color:var(--bg);font-weight:600;letter-spacing:-.2px}
.hdr-right button{background:rgba(255,255,255,0.08);border:none;color:var(--bg);width:36px;height:36px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.hdr-right button:active{background:rgba(255,255,255,0.18)}

/* UPDATE BANNER */
.update-banner{display:none;position:fixed;top:0;left:0;right:0;background:var(--rosa);color:#fff;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;font-size:13px;font-weight:600;align-items:center;justify-content:space-between;z-index:500;gap:10px}
.update-banner.show{display:flex}
.update-banner button{background:rgba(255,255,255,.22);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

/* CLIENTES SCROLL */
.clientes-nav{background:var(--verde-d);padding:0 12px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,0.08)}
.clientes-nav::-webkit-scrollbar{display:none}
.cli-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.cli-btn.on{background:var(--rosa);border-color:var(--rosa);color:#fff;font-weight:600}
.cli-btn-add{flex-shrink:0;width:32px;height:32px;border-radius:50%;border:1.5px dashed rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* TABS */
.tabs{display:flex;padding:12px 16px 0;gap:4px}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--cinza);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--verde-d);border-bottom-color:var(--verde-d);font-weight:700}

/* SEÇÃO */
.sec{padding:14px 16px}
.sec-titulo{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--cinza);margin-bottom:10px}

/* CARD ESTRATÉGIA */
.card-estr{background:var(--verde);border-radius:var(--raio);padding:16px;margin:14px 16px 0;color:var(--bg)}
.card-estr .label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--rosa);font-weight:700;margin-bottom:8px}
.card-estr p{font-size:13px;line-height:1.6;opacity:.9;margin-bottom:6px}
.card-estr p:last-child{margin-bottom:0}
.restricao{background:rgba(0,0,0,0.15);border-radius:6px;padding:7px 10px;font-size:12px;margin-top:6px;border-left:3px solid var(--rosa);opacity:.9}

/* PALAVRAS */
.palavras{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.palavra{background:rgba(255,255,255,0.15);border-radius:12px;padding:3px 10px;font-size:12px;color:var(--bg)}

/* PALETA */
.paleta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.cor-item{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(250,247,242,.8)}
.cor-dot{width:18px;height:18px;border-radius:4px;flex-shrink:0}

/* POSTS */
.posts-lista{padding:0 16px;display:flex;flex-direction:column;gap:10px}

.post-card{background:var(--white);border-radius:var(--raio);overflow:hidden;border:1px solid var(--cinza-l);transition:border-color .15s}
.post-head{display:flex;align-items:center;padding:13px 14px;gap:11px;cursor:pointer;position:relative}
.post-data{background:var(--bg);border-radius:var(--raio-sm);padding:6px 10px;text-align:center;min-width:46px;flex-shrink:0}
.post-data .d{font-size:17px;font-weight:700;color:var(--verde-d);line-height:1.1}
.post-data .s{font-size:9.5px;color:var(--cinza);text-transform:uppercase;letter-spacing:.6px}
.post-info{flex:1;min-width:0}
.post-titulo{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.post-intencao-preview{font-size:11.5px;color:var(--cinza);line-height:1.35;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;letter-spacing:.2px}
.t-fmt{background:#EDF2EE;color:var(--verde)}
.t-obj{background:#FDF0EA;color:#B5622A}
.t-ia{background:#F0EDF8;color:#6B4FA0}

.status-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--cinza-l);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:13px}
.status-btn.prod{border-color:var(--rosa);background:#FDF0EA;color:var(--rosa)}
.status-btn.pub{border-color:var(--verde);background:var(--verde);color:#fff}

/* DETALHES */
.post-body{display:none;padding:0 14px 14px;border-top:1px solid var(--bg)}
.post-body.aberto{display:block}
.detalhe{margin-top:12px}
.d-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);margin-bottom:6px}
.d-text{font-size:13px;line-height:1.55;color:var(--texto)}

.slides{display:flex;flex-direction:column;gap:5px}
.slide{background:var(--bg);border-radius:var(--raio-sm);padding:8px 10px;font-size:12px;line-height:1.4}
.slide-n{font-weight:700;color:var(--rosa);margin-right:4px}

.box{border-radius:var(--raio-sm);padding:12px;font-size:12px;line-height:1.7}
.box-leg{background:#EFF4F0;border-left:3px solid var(--verde)}
.box-prompt{background:var(--bg);border-left:3px solid var(--rosa)}
.box-int{background:#FFF5F2;border-left:3px solid var(--rosa);font-size:13px;line-height:1.5}

.btn-copy{display:block;width:100%;margin-top:8px;padding:9px;background:var(--verde);color:var(--bg);border:none;border-radius:var(--raio-sm);font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.btn-copy:active{background:var(--verde-d)}

/* FEEDBACK */
.feedback-area{margin-top:8px}
.feedback-stars{display:flex;gap:6px;margin-bottom:8px}
.star{font-size:22px;cursor:pointer;opacity:.3;transition:opacity .15s}
.star.on{opacity:1}
.feedback-txt{width:100%;border:1.5px solid var(--cinza-l);border-radius:var(--raio-sm);padding:10px;font-size:13px;font-family:inherit;resize:none;outline:none;background:var(--bg);height:70px}
.feedback-txt:focus{border-color:var(--verde)}
.btn-save-fb{margin-top:6px;padding:8px 16px;background:var(--verde);color:var(--bg);border:none;border-radius:var(--raio-sm);font-size:13px;font-weight:600;cursor:pointer}
.feedback-saved{font-size:12px;color:var(--cinza);margin-top:6px;font-style:italic}

/* AÇÕES DO POST */
.post-acoes{display:flex;gap:8px;margin-top:12px}
.btn-acao{flex:1;padding:8px;border-radius:var(--raio-sm);border:1.5px solid var(--cinza-l);background:transparent;color:var(--cinza);font-size:12px;cursor:pointer;font-weight:500}
.btn-acao.danger{border-color:#FECACA;color:#DC2626}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--cinza-l);display:flex;padding:8px 0 env(safe-area-inset-bottom,12px);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--cinza);font-size:10px;padding:4px}
.nav-btn.on{color:var(--verde)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* MODAIS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:22px 22px 0 0;padding:12px 20px env(safe-area-inset-bottom,24px);width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 32px rgba(0,0,0,.12)}
.modal::before{content:'';display:block;width:36px;height:4px;background:var(--cinza-l);border-radius:4px;margin:0 auto 14px}
.modal-titulo{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--verde-d)}
.modal-fecha{float:right;background:var(--bg);border:none;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;margin-top:-2px}

.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--cinza);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--cinza-l);border-radius:var(--raio-sm);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;background:var(--bg);color:var(--texto)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--verde)}
.field textarea{resize:none;height:80px}

.btn-primary{width:100%;padding:14px;background:var(--verde);color:var(--bg);border:none;border-radius:var(--raio);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-primary:active{background:var(--verde-d)}
.btn-secondary{width:100%;padding:12px;background:transparent;color:var(--cinza);border:1.5px solid var(--cinza-l);border-radius:var(--raio);font-size:14px;cursor:pointer;margin-top:8px}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--cinza);font-size:14px;line-height:1.6}
.empty-icon{font-size:36px;margin-bottom:10px}

/* INSTALL BANNER */
.install-banner{margin:14px 16px 0;background:var(--verde-d);border-radius:var(--raio);padding:14px;display:flex;align-items:center;gap:12px}
.install-banner p{font-size:13px;color:var(--bg);line-height:1.4;flex:1}
.install-banner p strong{display:block;margin-bottom:2px}
.btn-install{flex-shrink:0;background:var(--rosa);border:none;color:#fff;padding:8px 14px;border-radius:var(--raio-sm);font-size:13px;font-weight:600;cursor:pointer}

/* TELA */
.tela{display:none}
.tela.on{display:block}

/* CHIPS STATUS LEGEND */
.status-legend{display:flex;gap:12px;padding:10px 16px 0;font-size:11px;color:var(--cinza);align-items:center}
.sl-item{display:flex;align-items:center;gap:4px}
.sl-dot{width:9px;height:9px;border-radius:50%}
</style>
</head>
<body>
<div class="update-banner" id="update-banner">
  <span>🔄 Nova versão disponível</span>
  <button onclick="aplicarAtualizacao()">Atualizar agora</button>
</div>
<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <h1>Gestão de Conteúdo</h1>
      <h2>Sabrina Pupo</h2>
    </div>
    <div class="hdr-right">
      <button onclick="abrirConfigGeral()" title="Configurações">⚙</button>
    </div>
  </div>

  <div class="clientes-nav" id="clientes-nav"></div>

  <div id="main">
    <!-- TELA CALENDÁRIO -->
    <div class="tela on" id="tela-cal">
      <div class="tabs">
        <button class="tab on" onclick="trocarTab('posts')">Posts</button>
        <button class="tab" onclick="trocarTab('estrategia')">Estratégia</button>
      </div>
      <div id="tab-posts">
        <div class="status-legend">
          <span>Status:</span>
          <div class="sl-item"><div class="sl-dot" style="border:2px solid var(--cinza-l)"></div>Pendente</div>
          <div class="sl-item"><div class="sl-dot" style="background:#FDF0EA;border:2px solid var(--rosa)"></div>Produção</div>
          <div class="sl-item"><div class="sl-dot" style="background:var(--verde)"></div>Publicado</div>
        </div>
        <div class="sec">
          <div id="lista-posts"></div>
        </div>
        <div style="padding:0 16px 16px">
          <button class="btn-primary" style="background:var(--rosa)" onclick="abrirModalPost(null)">+ Novo Post</button>
        </div>
      </div>
      <div id="tab-estrategia" style="display:none">
        <div id="conteudo-estrategia"></div>
        <div style="padding:0 16px 16px">
          <button class="btn-primary" style="background:var(--rosa)" onclick="editarEstrategia()">Editar Estratégia</button>
        </div>
      </div>
    </div>

    <!-- TELA CLIENTES -->
    <div class="tela" id="tela-clientes">
      <div class="sec">
        <div class="sec-titulo">Seus Clientes</div>
        <div id="lista-clientes-mgmt"></div>
        <button class="btn-primary" style="background:var(--rosa);margin-top:12px" onclick="abrirModalCliente(null)">+ Novo Cliente</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn on" id="nav-cal" onclick="trocarTela('cal')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      Calendário
    </button>
    <button class="nav-btn" id="nav-clientes" onclick="trocarTela('clientes')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </button>
  </div>
</div>

<!-- MODAL: NOVO/EDITAR POST -->
<div class="overlay" id="modal-post">
  <div class="modal">
    <button class="modal-fecha" onclick="fecharModal('modal-post')">✕</button>
    <div class="modal-titulo" id="modal-post-titulo">Novo Post</div>
    <div class="field"><label>Data</label><input type="date" id="f-data"></div>
    <div class="field"><label>Título / Tema</label><input type="text" id="f-titulo" placeholder="Ex: Julho tem só 4 fins de semana"></div>
    <div class="field"><label>Formato</label>
      <select id="f-formato">
        <option>Carrossel</option><option>Reel</option><option>Foto única</option><option>Story</option><option>Vídeo</option>
      </select>
    </div>
    <div class="field"><label>Objetivo</label><input type="text" id="f-objetivo" placeholder="Ex: Urgência, Save, Alcance..."></div>
    <div class="field"><label>IA recomendada</label>
      <select id="f-ia">
        <option>Nano Banana</option><option>ChatGPT</option><option>YouTube Create</option><option>Canva IA</option><option>Outra</option>
      </select>
    </div>
    <div class="field"><label>Intenção estratégica</label><textarea id="f-intencao" placeholder="Por que esse post? O que queremos provocar no público?"></textarea></div>
    <div class="field"><label>Slides / Estrutura</label><textarea id="f-slides" placeholder="S1: Texto do slide 1&#10;S2: Texto do slide 2..."></textarea></div>
    <div class="field"><label>Legenda</label><textarea id="f-legenda" placeholder="Texto completo da legenda com hashtags..."></textarea></div>
    <div class="field"><label>Prompt para a IA</label><textarea id="f-prompt" placeholder="Prompt completo para gerar o design..."></textarea></div>
    <button class="btn-primary" onclick="salvarPost()">Salvar Post</button>
    <button class="btn-secondary" id="btn-del-post" onclick="deletarPostAtual()" style="color:#DC2626;border-color:#FECACA;display:none">Apagar Post</button>
    <button class="btn-secondary" onclick="fecharModal('modal-post')">Cancelar</button>
  </div>
</div>

<!-- MODAL: NOVO/EDITAR CLIENTE -->
<div class="overlay" id="modal-cliente">
  <div class="modal">
    <button class="modal-fecha" onclick="fecharModal('modal-cliente')">✕</button>
    <div class="modal-titulo" id="modal-cli-titulo">Novo Cliente</div>
    <div class="field"><label>Nome do Cliente</label><input type="text" id="f-cli-nome" placeholder="Ex: Casa Flor do Mar"></div>
    <div class="field"><label>Emoji / Ícone</label><input type="text" id="f-cli-emoji" placeholder="Ex: 🌸" maxlength="4"></div>
    <div class="field"><label>Instagram (@)</label><input type="text" id="f-cli-ig" placeholder="Ex: casaflordomar.sp"></div>
    <div class="field"><label>Posicionamento</label><textarea id="f-cli-pos" placeholder="Conceito central da marca..."></textarea></div>
    <div class="field"><label>Palavras-chave da marca (separadas por vírgula)</label><input type="text" id="f-cli-palavras" placeholder="Ex: Desacelerar, Família, Natureza"></div>
    <div class="field"><label>Paleta de cores</label><input type="text" id="f-cli-paleta" placeholder="Ex: Verde #3C5A44 · Rosa #D88D70 · Creme #FAF7F2"></div>
    <div class="field"><label>Restrições / Atenções</label><textarea id="f-cli-rest" placeholder="O que NUNCA fazer neste perfil..."></textarea></div>
    <div class="field"><label>Frequência de postagem</label><input type="text" id="f-cli-freq" placeholder="Ex: Terças e quintas"></div>
    <button class="btn-primary" onclick="salvarCliente()">Salvar Cliente</button>
    <button class="btn-secondary" id="btn-del-cli" onclick="deletarClienteAtual()" style="color:#DC2626;border-color:#FECACA;display:none">Remover Cliente</button>
    <button class="btn-secondary" onclick="fecharModal('modal-cliente')">Cancelar</button>
  </div>
</div>

<!-- MODAL: EDITAR ESTRATÉGIA -->
<div class="overlay" id="modal-estr">
  <div class="modal">
    <button class="modal-fecha" onclick="fecharModal('modal-estr')">✕</button>
    <div class="modal-titulo">Estratégia do Mês</div>
    <div class="field"><label>Foco do mês</label><input type="text" id="f-estr-foco" placeholder="Ex: Julho = alta temporada. Urgência + save"></div>
    <div class="field"><label>Regras de conteúdo</label><textarea id="f-estr-regras" placeholder="Ex: Nunca dois posts no mesmo dia&#10;Nunca sem legenda..."></textarea></div>
    <div class="field"><label>Observações extras</label><textarea id="f-estr-obs" placeholder="Qualquer contexto importante..."></textarea></div>
    <button class="btn-primary" onclick="salvarEstrategia()">Salvar</button>
    <button class="btn-secondary" onclick="fecharModal('modal-estr')">Cancelar</button>
  </div>
</div>

<script>
// ─── DADOS ────────────────────────────────────────────────
const DEF = {
  clientes: [
    {
      id:'flor', nome:'Casa Flor do Mar', emoji:'🌸', ig:'casaflordomar.sp',
      posicionamento:'"A casa é apenas o cenário. O que importa acontece dentro dela." — Airbnb em Peruíbe · 3 quartos · Quintal e churrasqueira · 5 min da praia',
      palavras:'Desacelerar,Convivência,Família,Natureza,Leveza,Acolhimento,Memórias,Praticidade',
      paleta:'Verde #3C5A44 · Rosa #D88D70 · Creme #FAF7F2 · Verde Escuro #2D5247',
      restricoes:'Não destacar jardim visualmente\nNunca dois posts no mesmo dia\nNunca postar sem legenda\nNunca prometer vista para o mar\nNão usar flores como elemento gráfico dominante',
      freq:'Terças e quintas',
      estrategia:{foco:'Julho = alta temporada. Foco em urgência + save + primeiro Reel do perfil.',regras:'Nunca dois posts no mesmo dia\nNunca postar sem legenda\nResponder comentários em até 30 min após publicação\nInteragir 10x/dia em #peruibe e #litoralsul',obs:'Proprietária (Alice) não pode postar sem alinhamento prévio — episódio 09/06 causou queda de 63% no reach.'}
    },
    {
      id:'amarela', nome:'Casa Amarela', emoji:'🌟', ig:'casaamarela407',
      posicionamento:'Casa de temporada em Peruíbe · Diferencial: 150m da praia · Slow living',
      palavras:'Descanso,Mar,Família,Silêncio,Proximidade',
      paleta:'Amarelo #F5C842 · Verde #3C5A44 · Branco #FFFFFF',

// ─── ESTADO ────────────────────────────────────────────────
let D, clienteAtual = 'flor', tabAtual = 'posts', postEditando = null, cliEditando = null;

function carregar() {
  try { const s = localStorage.getItem('gestao_v2'); D = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEF)); }
  catch(e) { D = JSON.parse(JSON.stringify(DEF)); }
  if (!D.posts) D.posts = {};
  D.clientes.forEach(c => { if (!D.posts[c.id]) D.posts[c.id] = []; });
}

function salvar() { try { localStorage.setItem('gestao_v2', JSON.stringify(D)); } catch(e){} }

function cli() { return D.clientes.find(c => c.id === clienteAtual); }
function postsCliente() { return (D.posts[clienteAtual] || []).sort((a,b) => a.data.localeCompare(b.data)); }

// ─── RENDER ────────────────────────────────────────────────
function render() {
  renderNav();
  renderConteudo();
  renderClientesMgmt();
}

function renderNav() {
  const nav = document.getElementById('clientes-nav');
  nav.innerHTML = D.clientes.map(c =>
    `<button class="cli-btn ${c.id===clienteAtual?'on':''}" onclick="trocarCliente('${c.id}')">${c.emoji} ${c.nome.split(' ')[0]}</button>`
  ).join('') + `<button class="cli-btn-add" onclick="abrirModalCliente(null)">+</button>`;
}

function renderConteudo() {
  if (tabAtual === 'posts') renderPosts();
  else renderEstrategia();
}

function fmtData(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const dt = new Date(+y,+m-1,+d);
  return {dia:d, sem:dias[dt.getDay()]};
}

function renderPosts() {
  const posts = postsCliente();
  const cont = document.getElementById('lista-posts');
  if (!posts.length) {
    cont.innerHTML = `<div class="empty"><div class="empty-icon">📅</div>Nenhum post ainda.<br>Toque em "+ Novo Post" para começar.</div>`;
    return;
  }

  const meses = {};
  posts.forEach(p => {
    const mes = p.data ? p.data.substring(0,7) : 'sem-data';
    if (!meses[mes]) meses[mes] = [];
    meses[mes].push(p);
  });

  cont.innerHTML = Object.entries(meses).map(([mes, ps]) => {
    const [y,m] = mes.split('-');
    const nomeMes = m ? new Date(+y,+m-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}) : 'Sem data';
    return `<div class="sec-titulo" style="margin-bottom:8px">${nomeMes.charAt(0).toUpperCase()+nomeMes.slice(1)}</div>` +
    ps.map(p => {
      const dt = fmtData(p.data);
      const stClass = p.status==='pub'?'pub':p.status==='prod'?'prod':'';
      const stIcon = p.status==='pub'?'✓':p.status==='prod'?'⏳':'';
      return `<div class="post-card" style="margin-bottom:10px">
        <div class="post-head" onclick="togglePost('${p.id}')">
          <div class="post-data"><div class="d">${dt.dia}</div><div class="s">${dt.sem}</div></div>
          <div class="post-info">
            <div class="post-titulo">${p.titulo}</div>
            ${p.intencao?`<div class="post-intencao-preview">${p.intencao}</div>`:''}
            <div class="tags">
              <span class="tag t-fmt">${p.formato}</span>
              <span class="tag t-obj">${p.objetivo}</span>
              ${p.ia?`<span class="tag t-ia">${p.ia}</span>`:''}
            </div>
          </div>
          <button class="status-btn ${stClass}" onclick="ciclarStatus(event,'${p.id}')">${stIcon}</button>
        </div>
        <div class="post-body" id="body-${p.id}">
          ${p.intencao?`<div class="detalhe"><div class="d-label">Intenção Estratégica</div><div class="box box-int">${p.intencao}</div></div>`:''}
          ${p.slides?`<div class="detalhe"><div class="d-label">Slides / Estrutura</div><div class="slides">${p.slides.split('\n').map(s=>`<div class="slide">${s}</div>`).join('')}</div></div>`:''}
          ${p.legenda?`<div class="detalhe"><div class="d-label">Legenda</div><div class="box box-leg">${p.legenda.replace(/\n/g,'<br>')}</div><button class="btn-copy" data-copy-post="${p.id}" data-copy-campo="legenda">Copiar Legenda</button></div>`:''}
          ${p.prompt?`<div class="detalhe"><div class="d-label">Prompt — ${p.ia}</div><div class="box box-prompt">${p.prompt}</div><button class="btn-copy" data-copy-post="${p.id}" data-copy-campo="prompt">Copiar Prompt</button></div>`:''}
          <div class="detalhe">
            <div class="d-label">Feedback do Post</div>
            <div class="feedback-area">
              <div class="feedback-stars" id="stars-${p.id}">
                ${[1,2,3,4,5].map(n=>`<span class="star ${p.feedback&&p.feedback.nota>=n?'on':''}" onclick="setStar('${p.id}',${n})">★</span>`).join('')}
              </div>
              <textarea class="feedback-txt" id="fb-${p.id}" placeholder="O que funcionou? O que melhorar?">${p.feedback?p.feedback.texto:''}</textarea>
              <button class="btn-save-fb" onclick="salvarFeedback('${p.id}')">Salvar Feedback</button>
              ${p.feedback&&p.feedback.texto?`<div class="feedback-saved">✓ Feedback salvo</div>`:''}
            </div>
          </div>
          <div class="post-acoes">
            <button class="btn-acao" onclick="abrirModalPost('${p.id}')">✏️ Editar</button>
            <button class="btn-acao danger" onclick="deletarPost('${p.id}')">🗑 Apagar</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }).join('');
}

      </div>`:''}

      ${e.obs?`<div style="background:#FFFBF5;border-radius:var(--raio);padding:16px;margin-bottom:12px;border:1px solid #F5E6C8">
        <div class="sec-titulo">Observações</div>
        <p style="font-size:13px;color:var(--texto);line-height:1.55">${e.obs}</p>
      </div>`:''}

      ${c.freq?`<div style="background:var(--white);border-radius:var(--raio);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">📅</span>
        <div>
          <div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--cinza);margin-bottom:2px">Frequência</div>
          <div style="font-size:14px;font-weight:600;color:var(--verde-d)">${c.freq}</div>
        </div>
      </div>`:''}
    </div>`;
}

function renderClientesMgmt() {
  const cont = document.getElementById('lista-clientes-mgmt');
  cont.innerHTML = D.clientes.map(c => `
    <div style="background:var(--white);border-radius:var(--raio);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;cursor:pointer" onclick="abrirModalCliente('${c.id}')">
      <div style="font-size:28px">${c.emoji}</div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700;margin-bottom:2px">${c.nome}</div>
        <div style="font-size:12px;color:var(--cinza)">@${c.ig||'—'} · ${(D.posts[c.id]||[]).length} posts</div>
      </div>
      <div style="font-size:18px;color:var(--cinza-l)">›</div>
    </div>`).join('');
}

// ─── INTERAÇÕES ────────────────────────────────────────────
function trocarCliente(id) {
  clienteAtual = id;
  render();
}

function trocarTab(tab) {
  tabAtual = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('on', ['posts','estrategia'][i]===tab));
  document.getElementById('tab-posts').style.display = tab==='posts'?'block':'none';
  document.getElementById('tab-estrategia').style.display = tab==='estrategia'?'block':'none';
  renderConteudo();
}

function trocarTela(tela) {
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('tela-'+tela).classList.add('on');
  document.getElementById('nav-'+tela).classList.add('on');
}

function togglePost(id) {
  const body = document.getElementById('body-'+id);
  if (body) body.classList.toggle('aberto');
}

function ciclarStatus(e, id) {
  e.stopPropagation();
  const posts = D.posts[clienteAtual];
  const p = posts.find(x => x.id===id);
  if (!p) return;
  p.status = p.status==='pend'?'prod':p.status==='prod'?'pub':'pend';
  salvar();
  renderPosts();
}

function setStar(postId, nota) {
  const posts = D.posts[clienteAtual];
  const p = posts.find(x => x.id===postId);
  if (!p) return;
  if (!p.feedback) p.feedback = {nota:0,texto:''};
  p.feedback.nota = nota;
  salvar();
  document.querySelectorAll(`#stars-${postId} .star`).forEach((s,i) => s.classList.toggle('on', i<nota));
}

function salvarFeedback(postId) {
  const posts = D.posts[clienteAtual];
  const p = posts.find(x => x.id===postId);
  if (!p) return;
  if (!p.feedback) p.feedback = {nota:0,texto:''};
  p.feedback.texto = document.getElementById('fb-'+postId).value;
  salvar();
  renderPosts();
  setTimeout(() => {
    const body = document.getElementById('body-'+postId);
    if (body) body.classList.add('aberto');
  }, 50);
}

function copiarTexto(btn, texto) {
  const orig = btn.textContent;
  const marcarCopiado = () => {
    btn.textContent = '✓ Copiado!';
    btn.style.background = 'var(--verde-d)';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 2000);
  };
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = texto; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      marcarCopiado();
    } catch(e) { alert('Não foi possível copiar automaticamente. Selecione o texto manualmente.'); }
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(texto).then(marcarCopiado).catch(fallback);
  } else {
    fallback();
  }
}

// Delegação de evento: o texto sempre vem direto do objeto post (nunca de atributo HTML),
// então aspas, emojis ou quebras de linha no conteúdo nunca quebram o botão.
document.getElementById('lista-posts').addEventListener('click', e => {
  const btn = e.target.closest('[data-copy-post]');
  if (!btn) return;
  const posts = D.posts[clienteAtual] || [];
  const p = posts.find(x => x.id === btn.dataset.copyPost);
  if (!p) return;
  const texto = btn.dataset.copyCampo === 'prompt' ? (p.prompt||'') : (p.legenda||'');
  copiarTexto(btn, texto);
});

// ─── MODAIS POST ────────────────────────────────────────────
function abrirModalPost(id) {
  postEditando = id;
  const p = id ? (D.posts[clienteAtual]||[]).find(x=>x.id===id) : null;
  document.getElementById('modal-post-titulo').textContent = id ? 'Editar Post' : 'Novo Post';
  document.getElementById('f-data').value = p?.data||'';
  document.getElementById('f-titulo').value = p?.titulo||'';
  document.getElementById('f-formato').value = p?.formato||'Carrossel';
  document.getElementById('f-objetivo').value = p?.objetivo||'';
  document.getElementById('f-ia').value = p?.ia||'Nano Banana';
  document.getElementById('f-intencao').value = p?.intencao||'';
  document.getElementById('f-slides').value = p?.slides||'';
  document.getElementById('f-legenda').value = p?.legenda||'';
  document.getElementById('f-prompt').value = p?.prompt||'';
  document.getElementById('btn-del-post').style.display = id ? 'block' : 'none';
  abrirModal('modal-post');
}

function salvarPost() {
  const titulo = document.getElementById('f-titulo').value.trim();
  if (!titulo) return alert('Título obrigatório');
  if (!D.posts[clienteAtual]) D.posts[clienteAtual] = [];
  const posts = D.posts[clienteAtual];
  if (postEditando) {
    const idx = posts.findIndex(x=>x.id===postEditando);
    if (idx>-1) {
      posts[idx] = {...posts[idx],
        data:document.getElementById('f-data').value,
        titulo, formato:document.getElementById('f-formato').value,
        objetivo:document.getElementById('f-objetivo').value,
        ia:document.getElementById('f-ia').value,
        intencao:document.getElementById('f-intencao').value,
        slides:document.getElementById('f-slides').value,
        legenda:document.getElementById('f-legenda').value,
        prompt:document.getElementById('f-prompt').value
      };
    }
  } else {
    posts.push({
      id:'p'+Date.now(),
      data:document.getElementById('f-data').value,
      titulo, formato:document.getElementById('f-formato').value,
      objetivo:document.getElementById('f-objetivo').value,
      ia:document.getElementById('f-ia').value,
      intencao:document.getElementById('f-intencao').value,
      slides:document.getElementById('f-slides').value,
      legenda:document.getElementById('f-legenda').value,
      prompt:document.getElementById('f-prompt').value,
      status:'pend', feedback:{nota:0,texto:''}
    });
  }
  salvar(); fecharModal('modal-post'); renderPosts();
}

function deletarPostAtual() {
  if (!postEditando) return;
  deletarPost(postEditando);
  fecharModal('modal-post');
}

function deletarPost(id) {
  if (!confirm('Apagar este post?')) return;
  D.posts[clienteAtual] = (D.posts[clienteAtual]||[]).filter(x=>x.id!==id);
  salvar(); renderPosts();
}

// ─── MODAIS CLIENTE ────────────────────────────────────────

  cliEditando = id;
  const c = id ? D.clientes.find(x=>x.id===id) : null;
  document.getElementById('modal-cli-titulo').textContent = id ? 'Editar Cliente' : 'Novo Cliente';
  document.getElementById('f-cli-nome').value = c?.nome||'';
  document.getElementById('f-cli-emoji').value = c?.emoji||'';
  document.getElementById('f-cli-ig').value = c?.ig||'';
  document.getElementById('f-cli-pos').value = c?.posicionamento||'';
  document.getElementById('f-cli-palavras').value = c?.palavras||'';
  document.getElementById('f-cli-paleta').value = c?.paleta||'';
  document.getElementById('f-cli-rest').value = c?.restricoes||'';
  document.getElementById('f-cli-freq').value = c?.freq||'';
  document.getElementById('btn-del-cli').style.display = id ? 'block' : 'none';

}

function salvarCliente() {
  const nome = document.getElementById('f-cli-nome').value.trim();
  if (!nome) return alert('Nome obrigatório');
  if (cliEditando) {
    const c = D.clientes.find(x=>x.id===cliEditando);
    if (c) {
      c.nome=nome; c.emoji=document.getElementById('f-cli-emoji').value;
      c.ig=document.getElementById('f-cli-ig').value;
      c.posicionamento=document.getElementById('f-cli-pos').value;
      c.palavras=document.getElementById('f-cli-palavras').value;
      c.paleta=document.getElementById('f-cli-paleta').value;
      c.restricoes=document.getElementById('f-cli-rest').value;
      c.freq=document.getElementById('f-cli-freq').value;
    }
  } else {
    const id = 'cli'+Date.now();
    D.clientes.push({
      id, nome, emoji:document.getElementById('f-cli-emoji').value||'👤',
      ig:document.getElementById('f-cli-ig').value,
      posicionamento:document.getElementById('f-cli-pos').value,
      palavras:document.getElementById('f-cli-palavras').value,
      paleta:document.getElementById('f-cli-paleta').value,
      restricoes:document.getElementById('f-cli-rest').value,
      freq:document.getElementById('f-cli-freq').value,
      estrategia:{foco:'',regras:'',obs:''}
    });
    D.posts[id] = [];
  }
  salvar(); fecharModal('modal-cliente'); render();
}

function deletarClienteAtual() {
  if (!cliEditando) return;
  if (D.clientes.length <= 1) { alert('Você precisa manter ao menos 1 cliente.'); return; }
  if (!confirm('Remover este cliente e todos os seus posts?')) return;
  D.clientes = D.clientes.filter(x=>x.id!==cliEditando);
  delete D.posts[cliEditando];
  if (clienteAtual===cliEditando) clienteAtual = D.clientes[0].id;
  salvar(); fecharModal('modal-cliente'); render();
}

// ─── MODAL UTILS ────────────────────────────────────────────
function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }

// ─── PWA / AUTO-ATUALIZAÇÃO ─────────────────────────────────
let swAguardando = null;

function aplicarAtualizacao() {
  if (swAguardando) swAguardando.postMessage('skipWaiting');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    // Verifica se já existe uma atualização esperando
    if (reg.waiting) {
      swAguardando = reg.waiting;
      document.getElementById('update-banner').classList.add('show');
    }
    // Detecta quando uma nova versão termina de instalar
    reg.addEventListener('updatefound', () => {
      const novo = reg.installing;
      novo.addEventListener('statechange', () => {
        if (novo.state === 'installed' && navigator.serviceWorker.controller) {
          swAguardando = novo;
          document.getElementById('update-banner').classList.add('show');
        }
      });
    });
    // Checa por atualização toda vez que o app volta a ficar visível
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') reg.update();
    });
  }).catch(()=>{});

  // Quando a nova versão assume o controle, recarrega a página automaticamente
  let jaRecarregou = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (jaRecarregou) return;
    jaRecarregou = true;
    window.location.reload();
  });
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'flex';
});

function instalar() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if (b) b.style.display = 'none';
  });
}

// ─── INIT ────────────────────────────────────────────────────
carregar();
render();
</script>
